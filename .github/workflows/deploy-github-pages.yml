# Build on push and deploy static assets to GitHub Pages.
# Repo → Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist is a Vite production bundle
        run: |
          if grep -q 'src="/src/' dist/index.html || grep -q "src='/src/" dist/index.html; then
            echo "::error::dist/index.html still references /src/ (dev entry). Pages would load .tsx as the wrong MIME type."
            exit 1
          fi
          # Matches /repo/assets/*.js (project site) and /assets/*.js (user.github.io, base /)
          if ! grep -qE 'src="[^"]*assets/[^"]+\.js"' dist/index.html \
            && ! grep -qE "src='[^']*assets/[^']+\\.js'" dist/index.html; then
            echo "::error::dist/index.html has no Vite /assets/*.js entry script."
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist



  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
